<!DOCTYPE html>
<html>
<head>
  <title>CL360 XPay</title>
</head>
<body style="font-family: Arial; padding: 40px;">
  <h1>CL360 XPay</h1>

  <button onclick="connectWallet()">Connect Wallet</button>

  <h3 id="wallet"></h3>

  <hr>

  <h2>Send ETH Payment</h2>

  <input id="recipient" placeholder="Recipient wallet address" style="width: 420px; padding: 8px;">
  <br><br>

  <input id="amount" placeholder="Amount in ETH" style="width: 200px; padding: 8px;">
  <br><br>

  <button onclick="sendPayment()">Send Payment</button>

  <h3 id="status"></h3>

  <script>
    let currentWallet = "";

    async function connectWallet() {
      if (!window.ethereum) {
        alert("MetaMask not found");
        return;
      }

      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      currentWallet = accounts[0];

      document.getElementById("wallet").innerText =
        "Connected: " + currentWallet;
    }

    function ethToHexWei(ethAmount) {
      const wei = BigInt(Math.floor(Number(ethAmount) * 1e18));
      return "0x" + wei.toString(16);
    }

    async function sendPayment() {
      if (!currentWallet) {
        alert("Connect wallet first");
        return;
      }

      const recipient = document.getElementById("recipient").value;
      const amount = document.getElementById("amount").value;

      if (!recipient || !amount) {
        alert("Enter recipient and amount");
        return;
      }

      try {
        const txHash = await window.ethereum.request({
          method: "eth_sendTransaction",
          params: [{
            from: currentWallet,
            to: recipient,
            value: ethToHexWei(amount)
          }]
        });

        document.getElementById("status").innerText =
          "Transaction sent: " + txHash;

      } catch (err) {
        document.getElementById("status").innerText =
          "Transaction cancelled or failed.";
      }
    }
  </script>
</body>
</html>
